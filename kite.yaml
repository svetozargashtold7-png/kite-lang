filetype: kite

detect:
    filename: "\\.kite$"

rules:
    # Comments
    - comment: "#.*$"

    # Double-quoted strings — region with escape sequences inside
    - constant.string:
        start: "\""
        end: "\""
        rules:
            - preproc: "\\\\."
            - special: "\\$\\{[^}]*\\}"

    # Single-quoted strings — region
    - constant.string:
        start: "'"
        end: "'"
        rules:
            - preproc: "\\\\."
            - special: "\\$\\{[^}]*\\}"

    # Keywords
    - statement: "\\b(set|def|give|end|when|orwhen|else|loop|while|for|in|break|next)\\b"

    # Logic operators
    - statement: "\\b(and|or|not)\\b"

    # Booleans / nil
    - constant.bool: "\\b(true|false|nil)\\b"

    # Built-in functions
    - identifier.function: "\\b(say|type|len|push|pop|keys|vals|str|num|range|floor|ceil|round|sqrt|abs|sin|cos|log|min|max|split|join|slice|has|reverse|concat|sort|map|filter|reduce|input|upcase|downcase|trim|index_of|replace)\\b"

    # Constants
    - constant: "\\b(PI|TAU)\\b"

    # Numbers
    - constant.number: "-?\\b[0-9]+\\.?[0-9]*\\b"

    # Operators
    - symbol.operator: "->"
    - symbol.operator: "\\.\\."
    - symbol.operator: "(==|!=|<=|>=)"
    - symbol.operator: "[+\\-*/%^<>=]"

    # Brackets
    - symbol.brackets: "[()\\[\\]{}]"

    # Punctuation
    - symbol: "[,:\\.]"
