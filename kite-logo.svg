<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 500" width="420" height="500">
  <defs>
    <style>
      /* Светлая тема — коричневый */
      .adapt-dark  { fill: #4a2510; }
      .adapt-text  { fill: #4a2510; }
      .adapt-line  { stroke: #6b3a1f; }
      .adapt-dot   { fill: #e07820; }
      .adapt-branch{ stroke: #5a3010; }

      /* Тёмная тема — светло-бежевый */
      @media (prefers-color-scheme: dark) {
        .adapt-dark  { fill: #e8c99a; }
        .adapt-text  { fill: #e8c99a; }
        .adapt-line  { stroke: #c8a070; }
        .adapt-dot   { fill: #f0a030; }
        .adapt-branch{ stroke: #c8903a; }
      }
    </style>
  </defs>

  <!-- no background — transparent -->

  <!-- ════════════════════════════════════
       КОРШУН СИДИТ — вид сбоку, вправо
       Крылья сложены, хвост раздвоен
  ════════════════════════════════════ -->

  <!-- ── ВЕТКА ── -->
  <path class="adapt-branch" d="M 60,330 C 90,326 130,324 180,325 C 230,326 280,328 360,322"
    fill="none" stroke-width="10" stroke-linecap="round"/>
  <!-- Кора на ветке -->
  <path d="M 80,326 C 100,322 120,327 140,324"
    fill="none" stroke="#7a4820" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M 200,326 C 220,322 240,327 260,325"
    fill="none" stroke="#7a4820" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- ── ЛАПЫ ── -->
  <!-- Лапа дальняя -->
  <path d="M 195,318 C 192,323 190,328 190,330"
    fill="none" stroke="#d07020" stroke-width="4" stroke-linecap="round"/>
  <!-- Пальцы дальней лапы -->
  <path d="M 190,330 C 183,332 178,331 176,329" fill="none" stroke="#c05e10" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 190,330 C 188,336 187,339 189,337"  fill="none" stroke="#c05e10" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 190,330 C 195,333 198,333 196,330"  fill="none" stroke="#c05e10" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 190,330 C 194,337 196,340 193,337"  fill="none" stroke="#c05e10" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Лапа ближняя -->
  <path d="M 210,318 C 212,323 214,328 215,330"
    fill="none" stroke="#e07820" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Пальцы ближней лапы -->
  <path d="M 215,330 C 208,333 203,332 201,329" fill="none" stroke="#c05e10" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 215,330 C 213,337 213,340 215,338"  fill="none" stroke="#c05e10" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 215,330 C 220,333 223,332 221,329"  fill="none" stroke="#c05e10" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 215,330 C 220,337 222,340 219,337"  fill="none" stroke="#c05e10" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ── ХВОСТ РАЗДВОЕННЫЙ ── -->
  <!-- Правое перо хвоста -->
  <path d="M 218,302 C 228,310 238,318 242,330 C 245,338 243,345 238,346
    C 234,338 230,328 224,318 C 218,310 214,306 214,300 Z"
    fill="#7d4422"/>
  <!-- Левое перо хвоста -->
  <path d="M 182,302 C 172,310 162,318 158,330 C 155,338 157,345 162,346
    C 166,338 170,328 176,318 C 182,310 186,306 186,300 Z"
    fill="#6b3a1f"/>
  <!-- Перья хвоста — штриховка -->
  <path d="M 238,330 C 241,340 240,346 238,346" fill="none" stroke="#4a2510" stroke-width="1" stroke-linecap="round"/>
  <path d="M 162,330 C 159,340 159,346 162,346" fill="none" stroke="#4a2510" stroke-width="1" stroke-linecap="round"/>
  <path d="M 228,316 C 232,326 232,334 230,338" fill="none" stroke="#4a2510" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M 172,316 C 168,326 168,334 170,338" fill="none" stroke="#4a2510" stroke-width="0.8" stroke-linecap="round"/>

  <!-- ── ТЕЛО — округлое, сидящая птица ── -->
  <!-- Спина/крылья сложены поверх -->
  <path d="M 178,180 C 175,200 172,240 175,275 C 178,295 190,308 200,310
